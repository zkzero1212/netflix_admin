<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NETFLIX - ADMIN</title>
  <style>
    body { background: #111; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
    .main-logo { color: #007bff; font-size: 2rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
    .card { background: #222; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: left; }
    .btn { width: 100%; padding: 18px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; transition: 0.2s; text-align: center; box-sizing: border-box; margin-top: 5px; }
    .btn-primary { background: #007bff; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); }
    .copy-chip { background: #333; padding: 12px; border-radius: 8px; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #444; margin-bottom: 8px; }
    .copy-chip:active { background: #444; }
    .hidden { display: none !important; }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
    .modal-box { background: #222; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; border: 1px solid #444; text-align: center; }
    .modal-content { font-size: 0.95rem; color: #ddd; margin: 15px 0; white-space: pre-wrap; line-height: 1.5; text-align: left; }
  </style>
</head>
<body>

  <div class="container">
    <div class="main-logo">ADMIN PASS</div>

    <div id="status-screen" class="card" style="text-align: center; padding: 40px 20px;">
      <h3 id="status-message" style="margin: 0; color: #ddd;">권한 확인 중...</h3>
      <p id="status-sub" style="color: #888; font-size: 0.85rem; margin-top: 10px;">잠시만 기다려주세요.</p>
    </div>

    <div id="admin-panel-screen" class="hidden">
      <div class="card">
        <div style="color: #aaa; font-size: 0.85rem; margin-bottom: 10px;">📺 넷플릭스 로그인 정보 <span style="font-size: 0.75rem; color: #888;">(클릭 시 복사)</span></div>
        <div class="copy-chip" onclick="copyToClipboard('freenetfltoy00@gmail.com', '계정')">
          <span style="color: #ccc;">계정</span>
          <span id="netflix-id" style="color: white; font-weight: bold;">-</span>
        </div>
        <div class="copy-chip" onclick="copyToClipboard('비밀번호로딩중', '비밀번호')" id="pw-chip">
          <span style="color: #ccc;">비밀번호</span>
          <span id="netflix-pw" style="color: #46d369; font-weight: bold; letter-spacing: 1px;">-</span>
        </div>
      </div>

      <div style="color: #ccc; font-size: 0.9rem; margin: 20px 0 10px 0;">
        넷플릭스 메일 발송 후 <b style="color: #007bff;">아래 버튼 클릭</b>
      </div>
      
      <button class="btn btn-primary" onclick="checkAuth()">🚀 메일확인</button>
    </div>
  </div>

  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <div id="modal-title" style="font-weight: bold; font-size: 1.1rem; color: #007bff; margin-bottom: 10px;">알림</div>
      <div id="modal-body" class="modal-content"></div>
      <button class="btn" style="background: #444; padding: 12px; margin-top: 10px;" onclick="closeModal()">확인</button>
    </div>
  </div>

  <script>
    // =========================================================
    // ★ 관리자님의 GAS 백엔드 주소를 여기에 적어주세요!
    const API_URL = "https://script.google.com/macros/s/AKfycbz2Miw2UtLT9yoVqd3OBQX1AeJTjDdplc_aczsIAjjzM9mkt15XusyQGAM9r3dXH9Vc/exec";
    // =========================================================

    let currentMasterKey = "";

    // 사이트 접속 시 URL 파라미터에서 키를 추출하여 즉시 백엔드 검증
    window.onload = async () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentMasterKey = urlParams.get('key');

      const statusMsg = document.getElementById('status-message');
      const statusSub = document.getElementById('status-sub');

      if (!currentMasterKey) {
        statusMsg.innerText = "접근 거부됨";
        statusMsg.style.color = "#ff6b6b";
        statusSub.innerText = "유효한 접근 경로가 아닙니다.";
        return;
      }

      try {
        const response = await fetch(`${API_URL}?action=verify&key=${encodeURIComponent(currentMasterKey)}`);
        const result = await response.json();

        if (result.success) {
          // 검증 성공 시 대기 화면을 숨기고 관리자 패널 노출
          document.getElementById('status-screen').classList.add('hidden');
          document.getElementById('admin-panel-screen').classList.remove('hidden');
          
          // 성공 시에만 계정 및 비밀번호 정보 세팅
          document.getElementById('netflix-id').innerText = "freenetfltoy00@gmail.com";
          document.getElementById('netflix-pw').innerText = result.data.pw;
        } else {
          statusMsg.innerText = "인증 실패";
          statusMsg.style.color = "#ff6b6b";
          statusSub.innerText = "마스터키가 올바르지 않습니다.";
        }
      } catch (err) {
        statusMsg.innerText = "통신 오류";
        statusMsg.style.color = "#ff6b6b";
        statusSub.innerText = "서버와 연결할 수 없습니다.";
      }
    };

    // 파싱 버튼 클릭 시 주소창에서 추출해둔 키를 들고 파싱 요청
    async function checkAuth() {
      if (!currentMasterKey) return;

      showAlert("처리 중", "관리자 권한으로 이메일함을 확인하고 있습니다...\n(약 2~5초 소요)");
      
      try {
        const response = await fetch(`${API_URL}?action=auth&key=${encodeURIComponent(currentMasterKey)}`);
        const result = await response.json();
        closeModal();

        if (result.success) {
          if (result.type === 'url') {
            window.location.href = result.url; 
          } else if (result.type === 'code') {
            const codeHtml = `<div style="font-size:2.5rem; color:#007bff; font-weight:bold; letter-spacing:5px; text-align:center; margin: 20px 0;">${result.code}</div>`;
            showAlert("🔑 로그인 코드", codeHtml);
          }
        } else {
          showAlert("파싱 실패", result.message);
        }
      } catch (err) {
        closeModal();
        showAlert("네트워크 오류", "메일을 확인하는 중 문제가 발생했습니다.");
      }
    }

    function copyToClipboard(text, label) {
      if(text === '비밀번호로딩중') text = document.getElementById('netflix-pw').innerText;
      
      const tempInput = document.createElement("input");
      document.body.appendChild(tempInput);
      tempInput.value = text;
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);
      showAlert("복사 완료", `[${label}] 항목이 복사되었습니다.`);
    }

    function showAlert(title, body) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = body;
      document.getElementById('modal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
  </script>
</body>
</html>
